# ==============================================================================
# FILE: ValidationMessages (Jakarta Validation)
# PURPOSE: DTO INPUT VALIDATION ONLY
#
# WHEN TO USE THIS FILE:
# Add keys here ONLY for constraints on incoming data (Request DTOs).
# If it uses an annotation like @NotNull, @NotBlank, @Min, @Max, or @Email,
# the message belongs in this file!
#
# CODE EXAMPLE:
# @NotNull(message = "{contract.buyer.required}")
# private UUID buyerId;
# ==============================================================================

# Contract Validation Messages
contract.buyer.required=Buyer ID is required.
contract.product.required=Product ID is required.
contract.downpayment.required=Down payment is required (can be 0).
contract.downpayment.digits=Down payment has invalid format (max 15 digits, 2 decimals).
contract.downpayment.min=Down payment cannot be negative.
contract.margin.required=Profit margin is required.
contract.margin.digits=Profit margin has invalid format (max 3 digits, 2 decimals).
contract.margin.min=Profit margin cannot be negative.
contract.startdate.required=Start date is required.
contract.installments.min=Contract must have at least {value} installment.
contract.installments.max=Contract cannot have more than {value} installments.