# ==============================================================================
# FILE: ValidationMessages (Jakarta Validation)
# PURPOSE: DTO INPUT VALIDATION ONLY
#
# WHEN TO USE THIS FILE:
# Add keys here ONLY for constraints on incoming data (Request DTOs).
# If it uses an annotation like @NotNull, @NotBlank, @Min, @Max, or @Email,
# the message belongs in this file!
#
# CODE EXAMPLE:
# @NotNull(message = "{contract.buyer.required}")
# private UUID buyerId;
# ==============================================================================

# Contract Validatie Berichten
contract.buyer.required=Koper ID is verplicht.
contract.product.required=Product ID is verplicht.
contract.downpayment.required=Aanbetaling is verplicht (mag 0 zijn).
contract.downpayment.digits=Aanbetaling heeft een ongeldig formaat (max 15 cijfers, 2 decimalen).
contract.downpayment.min=Aanbetaling mag niet negatief zijn.
contract.margin.required=Winstmarge is verplicht.
contract.margin.digits=Winstmarge heeft een ongeldig formaat (max 3 cijfers, 2 decimalen).
contract.margin.min=Winstmarge mag niet negatief zijn.
contract.startdate.required=Startdatum is verplicht.
contract.installments.min=Contract moet minimaal {value} termijn bevatten.
contract.installments.max=Contract mag niet meer dan {value} termijnen bevatten.
contract.costprice.required=Kostprijs is verplicht.
contract.costprice.digits=Kostprijs heeft een ongeldig formaat (max 15 cijfers, 2 decimalen).
contract.costprice.min=Kostprijs moet groter zijn dan nul.

# User Validatie Berichten
user.phone.required=Telefoonnummer is verplicht.
user.phone.size=Telefoonnummer mag maximaal 20 tekens zijn.
user.email.invalid=Ongeldig e-mailformaat.
user.password.required=Wachtwoord is verplicht.
user.password.size=Wachtwoord moet minimaal 8 tekens zijn.